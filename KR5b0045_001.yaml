front:
  text: 太上洞玄靈寳八威召龍妙經卷上乃七元始天尊言赤明始開混沌始分元綱流演髙上所撰龍漢冥蒙赤字輝爛自然天書微妙難論處於玄之又玄號爲海眞龍王丈人海眞之王是海有眞位在其中星氣所蓋以號玄源一百八十靈海各有萬餘洪泉泉通於水嚢衝造三十二小天其時欲滅山海一傾八威吐毒水火欲生海遊輪轉山嶽激崩龍王縱壑蛟虬翻洋龍王從官三官諸君分別有道記詔泰玄海眞亂作諸海閉塞洞門靈寳天尊元始髙上眞人巳召八威制伏龍王赤字玉訣其中有文可度生死蠢飛衆生明可寳祕災眚以禳千日用習歳建日子午行道燒香轉經呼召八威龍王丈人聞經歡悦低頭閉眼有受召經不遇災眚八節登嶽四時投淵大小劫至以符投津龍王奉迎鳥毋引接上造玉京提擕玉皇元始天尊言三十二天凡有一百八十海又有嶽海三十二水囊龍王丈人遊觀海嶽洞淵之中見有可度見有可仙演造八威召龍龍王却洪滅炎妙經常爲行術自得延年尸解免脫十苦八難抜度七祖上登南宫朱陵林中自然飲食死骸還神元始天尊以髙上玄度眞人八節日登靈山召諸海龍王丈人誦八契并召文及符隨節用立春之日用青繒九寸丹書州郡縣鄕里年紀所封先生名某甲佩三部八景天仙地眞常在身中乞某今立春之節奏名泰玄削除死籍斷絶罪根立春日誦四方詠用法召文如前嗟呼龍漢尊勇猛髙神王洞淵諸靈寳以召龍王君魔王丈人主元始元聖神制威住八毒滅洪止炎煙逍遙虛無散身生水火光大運會開度彌劫爲一齡春分日誦并召文及符用如上法淵通龍到尊水母承飛雲諸虛靈嶽沒蕩蕩無一存赤鎭絶堈嶺東井伏華津玄和諸玉女靈妃六甲人空洞不進賢靈皇還九玄勤敬髙晨業以度得道尊立夏日召文用絳繒八寸丹書如上法赤明玊字生大微劇鬰羅正光佩雲景相好不爲多化遊人中道至眞誰是家乞免五難中制召諸天魔龍王㗸符出諸海成塵沙靈嶽不崩䧟福地更錬胎夏至日召文用絳繒八寸書如上法虚皇承靈飛大霄九玄上風雲隱宛微講誦五嶽匠福地在河澗靈山有洞尚仙芝多妙藥鍊服生光相分布諸寳園珠玊鎭靈藏硨磲精琉璃琥珀金剛鏡立秋日召文用白素六寸書如上法煌煌太白宿苕苕崚嶒嶺龍王決天河諸海一時并三十二天眞各佩威龍經以過後龍漢學者登玉清觀行吐毒狩漱芬灌冠纓浩浩無窮崖幽遼遠大靈秋分日召文用白素六寸書如上法劫運諸天交大象不復生十方靈寳尊訖號眞人形三洞奉道元眞妙髙上經佩者入空虚誦詠都泰清道爲眞中尊以度不窮齡至眞歸是無學修飛上清立冬日召文用皂繒五寸書如上法靈鳥亂龍漢鳯虬不復降福首三台宅號位眞悲忘靈嶽至學士佩笈參師匠持以游詣樂消魔誦明鏡三元元始宗演造龍王召八威毒氣散諸海無涌遼冬至日召文同用皂繒五寸書如上法大明照十方諸天各欲崩靈業大乘宗諸海發洪波上造玊京基下至淵洞鄕蠕飛蠢勤類一切隨路行群魔更束帶受誡修寳經輪轉變自然體有無等形右八節誦各隨節誦之四時召文四時之日春甲寅夏甲午秋甲申冬甲子投水簡用金龍一口碧珠二枚西水東向者是靈海源也正向北方誦契三過以龍珠相連朱書青繒置水中更重勑百八十靈海大眞八威不得放毒龍王㗸符即爾響到若不見形者此水自有異聲涌浪即是靈應修之三十二年八威奉迎龍王導引重勑法召文儀太玄太素太微三元君元始髙眞上景先生玄和玊女靈妃夫人某甲先封某海神王以護淵通天洪漏水災今以某時之日奏賫金龍碧珠以𧵥先君乞上名帝籍削除死根四時日投水簡赤書青紙以北向誦四契梵天音
