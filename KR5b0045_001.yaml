body:
  text: 太玄太素太微君頌第一太上洞玄文三元靈寳眞元始吐玉訣是爲上古言八威縱毒氣誅滅妖俗塵正道有空洞髙妙元氣尊瞬目過六度騰身參泰玄百八十海沸龍漢開洪門淵通諸漢首人鳥靈嶽根虬獸蛟鯨勇浩浩守洞文觀見學仙客蹊路放炎煙催促鬱儀綱收録結璘晨陽光不復朗隂精不復明百六陽九盡大小劫更生三元君頌第二八威龍王神住世無姓生縱氣吐八毒不度無道人愚類不蕩除俱會五苦庭橫屍諸國土白骨暴路間靈嶽多俗穢盡是憂惱臣存時不修經聞法耳不餐勤競滅蠢類蠕飛諸衆生前身受是對今乞免罪名元始髙眞頌第三蕩蕩龍漢宅朦朧靈嶽㝠遼遼諸天府混沌始氣生寂寂幽洞宫崚嶒靈眞庭飄飄髙仙士清淨本業銘龍鱗處淵源虎豹藏壠田不見學至師還聞苟且聲饑咽飡元氣渴飲玄玉精持養枯骨質以度不窮齡上景先生頌第四溟涬豁落宫誦泄浩無崖列宿一時倒星辰化爲逸禁元根莾莾丁皇無堪基沉浮任運轉焦枯各有時蕩旦無無遂萬劫復更來人肌歘倐命至法度我災迴遷虛皇路億歲是一時身佩八威策以消八素災元始天尊從龍王丈人龍漢諸眞八威牽引龍鱗虎豹獅子辟邪虬蛟鳯鵠鴻鷺雝雝而來俱㑹南陽洞臺七寳宫中上觀洪崖其時清虛澹泊天尊演召八威龍經策文符圖讚誦以授未悟明案修袐受法寳玉得傳祕之祕之輕洩㓕身八威䇿文修靈寳齋佩此䇿章群眞嚮引魔王不干八威䇿文法用眞檀長八寸廣四寸白地錦衣長尺廣四寸囊盛齋時佩身三部八神在左䇿文在右䇿文裏朱字皆使方正上古上皇元始天尊始生元君元素太眞太素元一君三素髙神靈寳元始君元始丈人大帝玉清神師景陽先生泰清玉歴太眞大聖大仙君五嶽地仙靈山道君某甲本生某郡縣鄕里屬某天被某宿封某嶽先生某官道士伏聞八威神䇿以召龍王元始生養特蒙髙眞賜爲封合上名帝籍削去死根威神侍衞群魔却行周歴諸海任意縱橫如文律今策文外符百八十海精龍王丈人眞形度大小劫盟文元始演上古髙上丈人太上大道君元靈老予無量道尊東府太上南極丈人西靈洞母北玄眞人中宫太帝黄老元君同遊㑹淵通宗飄竺落諸天龍漢間清虚靜黙記輪轉運度劫數衆始遣玄和玉女靈妃夫人各十二人賫太上洞玄靈寳大小劫天地運度八威䇿文以召龍王變化空洞以鍊眞神導引生圖安鎭二十四眞神其經髙妙授與白石空洞玄度眞人修學以付髙上道君傳玉仙金母金母傳無上李夫人夫人傳北極老君老君傳上景先生先生傳太和王君王君等學各經數龍漢經還洞鄉隱不復出學太上洞玄靈寳經者百無一上皇之時髙上老子演置種仙使飛天人賫太古元始天尊三十六部妙經封置五嶽靈山洞中人間有至德者自見其文也至東晉成帝元年七月十一日甲子十方靈寳天尊衆眞下降開洞經演法度人乃授成帝此經上登十絶遺文世間化度一切明按袐也成帝受大小劫諸經盟信法物黄金五兩金環一雙五方紋繒金龍一口玉魚一口碧珠二枚愽山香爐一口地布一張白銀十兩上廚九人亦七五三盟法用此信以脆元靈老子始皇天尊作壇在崖石上使遙觀靈泉遠世人壇成法師東向告盟受者弟子某州界土穢氣胎生蠢類遭遇元始加潤和氣得盻妙文今奉齋法儀蒙以告盟億祖爲誓弟予某郡縣鄉里某號某甲年若干歳甲以下生穢質被銜靈和三元所載三洞所養未知宿命拔罪之根明悟仙術昔詣某法師某甲奉受太上洞玄靈寳尊妙法經出入難想至道妙貴非某甲下才腐骨臭肉所可佩誦不自忖量思効日新在進無退伏聞元始演教大小劫八威召龍變化空洞二十四眞神導引三光洞玄之根寳玉之尊洞一之眞上眞要訣實所希聞甲投命束首乞丐成就恩惟明先生垂恩授度不敢輕露告盟之後七祖爲誓約自閉塞寳玉有宣輕洩宣露甲身家口謝天地水三官萬沒之日後不敢有怨某年月日某郡縣鄉里太一無極金剛畢劵三洞三景弟子左領神太上主者三皇五嶽大傳北嶽先生某官道士曽孫小兆眞人某甲稽首再拜啓盟上告上啓上上元始上古髙上太上大道君元靈老君無量道尊東府太上南極元君丈人西靈洞母北玄一君中宫老君十方太眞小臣某甲上啓元君應化經法賜宣令悟今有某甲謹齎法信求盻篇目臣以去某歳某月日謹詣某洞先生五靈眞人某宫道士某郡縣郷里某對共告盟寳質珠玉爲信啓付三十六部目録別吿八景神眞大小劫運度變化空洞周流五嶽大宅靈山今有某州郡先生祭酒某甲奉齎法信五方紋繒金龍玉魚碧珠白銀地布香爐求乞告盟度殺寳祕安國救民土地歡樂無有憂患以遊行五嶽諸所經由江湖大澤山川溪谷群靈皆爲伺迎龍麟虎豹獅子辟邪常所持㑹天眞地仙覆蓋某身法啓度事竟某甲案如修承恩惟上古太上告下三十二天削某甲死籍斷絶罪根弟子更向東方百八十拜禮三十二揖向四方散髮臣某甲重啓某山太眞靈洞天尊某甲求某告盟某經某山太眞當爲保舉今某甲壽如靈嶽劫數不衰弟子讀告盟頌浩浩無窮崖龍麟來奉迎水毋西遊外炎火不復傷身登玉京闕飄然凌髙翔太上洞玄靈寳八威召龍妙經卷上
