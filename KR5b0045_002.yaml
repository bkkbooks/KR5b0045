body:
  text: 兼化別見形變景靡不通亦為衆說法戒悟後學童為行多慈念見賢靡不恭上聖補真人方始化世間功成遊四海五嶽遍周旋得仙道遺名行積於後代化悟於後賢世未多災橫勤齊以度身若能養三命道錬於三元端坐思吾道遊宴於崑崙未能升玄虛且樂遊地仙不羡人間樂遨遊五嶽巔然後鍊金液飛升造皇乾何不勤修齊淪遠世俗間百鬼所攻伐恐虧天命年念念善相續施惠救窮人天道不虛戒勸子作善緣為善患不久積德楅命延太上洞玄靈寶八威召龍妙經卷下
  hash: sha256:707ff6f4cc6378c23665e11446980a4eced586c7d52b31e55b3e87785ac1dfb4
