body:
  text: 兼化別見形變景靡不通亦爲衆說法戒悟後學童爲行多慈念見賢靡不恭上聖補眞人方始化世間功成遊四海五嶽遍周旋得仙道遺名行積於後代化悟於後賢世未多災橫勤齋以度身若能養三命道錬於三元端坐思吾道遊宴於崑崙未能昇玄虚且樂遊地仙不羡人間樂遨遊五嶽巓然後鍊金液飛昇造皇乾何不勤修齋淪遠世俗間百鬼所攻伐恐虧天命年念念善相續施惠救窮人天道不虚戒勸子作善縁爲善患不久積德楅命延太上洞玄靈寳八威召龍妙經卷下
  hash: sha256:a907d4ff5d04c57fc448a57eaa065b154c6547a225e762891411c2cc91811bc3
