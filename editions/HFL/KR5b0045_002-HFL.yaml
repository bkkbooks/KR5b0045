front:
  text: 太上洞玄靈寳八威召龍妙經卷下乃八大道君曰太上元君與上皇無極太帝君遊於崑崙玉京之山又與妙行眞人太眞君太眞丈人從五嶽四瀆諸仙眞各二千四百人俱下遊因上請天皇地皇人皇君同降玄都山衆官圍繞臺闕聽講敷演說法爾時有龍淵丈人號曰龍君者復乘將群龍數萬來詣三皇太帝君聽說善法及作功德之事歎言無上道德本自尊髙虛無無上之上大乗百六運度無極之化勸善敷救生死化導之勤又有九千六百億正眞之道並累功積德不可稱數並以道化教導生法執權方便普爲拔度諸惡一切死根人行四慈之心濟度傷害横災天地枯槁人民嗷嗷龍君仍化携將西河沙漠之外無極虞淵地中群龍數千萬負水桑雲彌布天下普蒙洪注灑潤五嶽四瀆之神普興雲羅廕天覆地濟度天下枯渴累日之中水陸普被流潤川谷盈滿浩浩蕩蕩爾時又有上天遣綵女二十四萬人導從太上太上無極太帝君蓋天來下偈歌作伎周行四海之内慶觀天民受慶之樂國祚太平天下人人莫不喜踊各復音聲相和其時大道若道德君太帝君三尊至眞神人髙聖妙行眞人天帝太皇萬萬億億億萬衆來躬奉金童玉女大億千萬衆擎持香華蓋天來下奉迎三尊四眞無上無極無先元君太帝太尊君大神金童玉女香華玉女嘯歌邕邕與天下地上億千萬神並與数千萬綵女俱進太帝三尊几前長跪肅然爾時龍君又將數千萬龍來伏太帝前良乆龍君上白太帝三君自承三皇造化開闢以來未遭陽九百六之運今洪水枯後九千九百歳枯陽蔽淵水母逃匿故使枯陽藏景於九泉之下炎障揚於八極之内萬民枯竭嗷訴上天辭訴云云枯死之人天下三分過半焦煎欲盡三年之後惡逆悉盡又召龍君命虞淵令龍君御群龍數千萬衆來施天羅負水灑澤旬月之中枯死者皆得生蘇國土之中十分人民纔餘一分爲種見而考之問其何縁獨得侷存枯而不滅也種人曰夫子所以被枯酷而不絶者正受三官劾校先亡有積善功德世勲相及且一已修身少不履非積勤累德爲天官所保地神所長以此學者應在偏仙之列逆被甄別當驅除火鍊之初天地水三官考讎先世積功相䨱已身勲勤功著南宫遺名後代當災之時三秦被勑南嶽君炎障使者悉見濟度之恩幷請天帝火珠使者流火飛鋉金眞虎符太一金剛赫奕寳章引景神眞鳯文眞符擁護灑而拂之遂得炎飛仙賢與金口大鳥兼束濟度得於災中免脫成生見戒積善之行所致善祐之感也可不勤修齋直也龍君曰積善之功悉從道來夫欲建功積德者當依太上靈眞三寳之齋累年積月修習不倦者司命表秦善功於上天天帝曹下勑三官記列功續三災五難尅得度脫齋功尢重可不勤之哉生生之根定矣今撰出爲太上八威召龍經施請祝龍於上篇記根原說於下卷也大上大道君說連屯㤗因枯而得榮唱乃說頌曰蕩蕩龍君受天至靈遭時陽九百六之傾萬姓煎枯渴死淵庭仰天呼嗟求愍災攖叩訴悲喚煩濁天眞上天感應呼召龍王群龍逃身匿景潜形藏閉虞淵崖石之硎八威嚴勑命召交幷如有龍君脇帶五星指叩虞淵群龍飛鳴匡御千萬承受功名收攝雨師雲羅上京三日三夜灑淵清靜禾稼豊茂萬民受生四時和調咸亨泰寧大道君曰贈讃龍君之大功其德巍巍乎説者有習明有五戒文如左訓導多慈心天道為開冥愛護釋憂患功德流後生道不負人功患人不能營棄何來運雕善士心伶俜勤勤勸修善遇度愍災櫻龍威功德大惠澤荷天靈濟活天下人莫不受福榮陽九旣得克百六亦夷平枯邪被灑澤煩濁見澄清八威制命䇿寳章及帝瓊悉是制毒章威滅狩魔兵龍王投河側群龍出駭鳴積善萬福降長齋讃音聲莫不從善來戚致於上靈福降如天雷聾痾悉得聽盲者並開見跛者得起行善者神所助惡者鬼賊刑道以善爲本德以信爲明慈孝天所愛勤道命不傾道君曰龍君之功重矣大矣可謂善哉善哉者其乃宿勲天心莫不感焉況神眞太眞說科戒之美矣道君語龍君曰汝承宿世功德巳顯乃爲衆恩及近勞勤三寳之中功之表也汝諦聽吾戒思惟吾言當復廣說大道元始之法其言至要應所修行無限之善法龍君言曰大善之行云何願聞思聽輙當更受戒言宣布十方勸進善心令不倦也於是太上大道君答龍君曰又有一法行善道士者其人相好備具得諸道眞人寳經三皇洞眞人有太眞大科丹簡墨籙幷三皇玉清隱書三皇文字泰清丹經飛石隠形靈妙童丹之袐術亦其眞也道之妙眞天地元譜所記其言明矣飛仙之要至矣重矣可不動之善修念也至道之言夫行至信之信本也大善巍巍制御小乗之法冝禁之限也冝有節也節之有所止其威也大乘之行觀乎一切一切衆生三寳之功使其有漸也謂龍君有宿功積德之行别有三十二戒法承三十二天之儀戒法皆勸善之始也復有十六事進増智慧顯布弘惠之勤何謂十六進増智邪施善行衆齊具如眞戒言無缺忍不應謂忍果上精進致定諸行巳具智慧情信行悉已足供事如道遊靜樂門閑備六賢法最有十善飾身口意徳具操行知足樂靜之身三自勸進修内外之善勸諸德行並修十六行法之事應受祥福演大智心顯賞功於大道之世施弘布慧流化於後代也又復龍君有善智慧之心二十二事亦令除徑之意存大乗之志髙且淸也夫太清去濁事抑諸俗不言雜事不行非法棄去邪惡執諸智慧修行善法者其道通焉其道大焉龍君之威巳制巳入大乘況於太上者乎龍君復行二十二事能進智踊能信順心不可當諸魔官屬拜邪俗外道降而却之何謂踊過於常人之心我心志猛定志言所防必固强行不墮心不懈怠也踊時正如天地威神威鬼威俗威僞威毒威狩威非威物八威之策故有所像也威者如大金剛堅固之行是謂道言龍君眞人有二十二踊法能有威罔致有踊剛之行致普智慧之心一切衆魔及諸魔外邪外道不得敢亡當龍君之踊制也道不虛行故有軌儀道曰夫河海楊波太陽枯焦洪波四合興雲造雨靜風止注役龍命眞威振之時群龍驚飛雲停霧聚開蕩宇内加潤旱桔五香敷庭正大道大明也大善之行可謂善哉大道君曰龍君眞人亦旣施威録召群龍時當先祭勞大龍王醮河神風伯雨師又祝龍詠河伯水神虞淵使者三過祝願身齋三日臨河川流而頌詠此上篇盟文也祭醮盟誓求命龍之時常亦奉敬恭恪河伯五嶽四瀆諸神也可謂天氣下降地氣上昇洪流之注要須隂陽合徳二儀相感四時順焉五嶽操躬四海冥合河神操龍虞淵洞溢八門開通也其道成焉功之大也大元眞人龍君曰巳受四時灑澤命龍之法有未見五明之化何謂五明一曰上洞無欲之明二曰彼我心志之明三曰五達九合之明四曰智慧應機之明五日逺瞻十方朗無礙違之明是爲五明洞焉五明之照上承三皇五星之精次承五嶽四瀆之靈又承五香芝英之明五香之明絶海異邦一株五根一莖五枝一枝五葉一間五節五五相當故仙賢名之五香之木焼之十日上徹九皇之天有大慈之心徳化之聖也大道君又告龍君曰宣化善方若有好樂修齋求道之人有情信可修要道者乃可普加授之以明法化之神則後賢有通明不絶之善義也於是龍君受命乃乗龍飛集虞淵龍池引將群龍來降到諸國普使天下須水旱者悉使依上篇經告誓醮水官河神之屬然後龍淵丈人當開池雲昇負水來灑注也大道君曰命眞人龍君以時使之非時所須依常自供給天仙飛仙官屬自各各常所給天官之羽儀非請時求雨水之事欲齋轉龍王經上下二篇使之音氣悲切向河水流之中詠之各七遍次法師讃梵唱善咸使河神感動群龍悲切者翳然赤身降見形於東西之方三日感至即白日揚光而夜明以通晴之感應也大道君又命龍君眞人曰若當欲齋值天大旱遍地揚塵積月累日亢陽不澤者又應命召龍君告求雨施也依上篇盟文誦詠下篇七遍哀而美者天眞龍君奄爲之乗龍降矣依如上篇當詠誦之上篇下篇立一日一夕各得七遍祭醮河神龍君求遣群龍飛入四海江河之中飛降昇上負水遊演彌布天中洪注滂沱三曰雨灑三夕先羅香澄續夜晝則雨施吹呼立至正眞所加無量枝條累柯堂堂聖王德行大善昇登變通非常所盡命召甚難事竟速遺此龍君神化清靜灑澤之感非至精國主何便能致此降哉緬緬夷平非篤不矜道眞無上言並有四等行善功徳之大者何爲四行道曰如其修清靜爲之一行也申志道心者二行也善化物得成爲三行也建功方便濟度衆生之命爲四行也夫修四功等者何也哉且龍君眞人曰乃有八直之行如行八威制召之命者皆從正道之心等焉如非法之事故不使巳善之賢見非法之科也入當明宣之宣善不普各由梵主不告諸弟子師之咎也師之責也眞人龍君曰亦聞道有三界何爲三界進勤修德於虚無應行者於無色界巳悉清淨得淨我性命亦能過法界法界淨故則數界淨數界淨故則無數界淨無數界淨故得三界淨二界淨故眼識界淨眼識界淨故意識界淨意識界淨故得空界淨空界淨故諸法界淨因是淨故則諸法等淨如空空等淨故得衆生淨以諸淨故得衆生守以諸淨故便無其二亦不著二無二淨故則道清淨以斯言之清淨之上道矣眞人龍君又言道說亦無衆念亦不念道諸念悉淨若如登上妙寂於彼永無是謂無門念應無所念無念道者亦無識念其道都無入乎冥冥行此無念無念道之至眞矣若龍君眞人欲行斯道清淨意者當明曉淨行亦使其身口意清淨行生受氣也於無中而玄禀有也謂之生道道之根焉眞人龍君曰何謂身行至道言曰身行去來生法來無盡法現在景法終無盡法其無盡者是謂身行又復身法因縁合會其因縁老則空無想淡然無念如此之眇眇龍君今欲像之模法觀身如斯之道不可不汲勤之焉得眞道矣大道君曰龍君眞人若乗是淨心生於有欲之界而在色界與諸天俱處衆梵之中安靜進止無躁動者是龍君眞人能與諸天神人化導以權或生色界而欲界現而有象又與諸天念衆生周旋生起不覺有勞拂之慢衆生賢德亦無自輕彼以斯行清淨諸定正心受之於上道莫不飛行於玄虚也大道君曰夫眞人巳悉合自然之行恒有清淨之體行者斯其眞大矣自執身巳定復不隨止以定所生者故有進退之心非受眞之謂之譬如無上眞人教化之始亦有善權方便若道士志學暁解清淨飛行變化無方可謂勤修道不負人大道君曰又聞龍君眞人教化之始以不習以求道習不習無習以想道習者故可以知道之行亦不習於望道之習亦本不求習了解者或自骨法巳洞此元由也不習所生冀向道習不習之行滅度亦無解死生之道習不習執念恒在道不亦明哉道將明哉至道言曰夫轉虚眞三洞法輪無量龍經者亦羣龍歡踊龍君又言眞道不逺三五復反清晴見候求雨召龍龍君一降嘯歌嗈嗈灑霑旱苗所請非衡虞淵河官五嶽髙峯說法教化唯善爲忠孝慈蒸蒸天下無雙節法所造或悟以龍龍君一降莫不傾匡制䇿召眞并得魔王萬鬼滅景蓬神曲躬斷絶五道昇舉髙嵩并出齋文教導童蒙流水金符赫奕寳章左帶六甲右佩印章唯念三實執在心胷志道勤齋何問飛空飛空道長長訓従容道若非習得何忽與習想求道歸空無時須立形像患人志不堅是故出隨景不樂求道習蕩除諸穢壞眞道都無習清淨却魍魎若有起習者精誠奇可常道云無我念我念絶無影絶念從虚來虚來有實生子能修善化善化致眞靈誰知眞道貴金丹在子形養育玄邕下壽命延且長何爲營短命不肯脫元精元精甚易知安存玄妙城間開日月下鳴鍾㑹吏兵誰能解悟然在想三元庭不解求吾道反爲災所刑身滅刀山峯毀辱敗道名何不修齋直萬歲免飄零伹患功不積不患積不成大道不虚言恐子羅罪攖故開三洞寳勸爾養長寜過度五難苦仙飛之皇庭吾我自相知誰知眞可聆龍君眞人曰吾受太上太帝之道躬禀無上正眞之法以勤營齋直損巳布施爾欲度身必先度人爾欲成身必先成人爾欲自貴必先貴人爾欲自敬必先敬人爾欲自立必先立人爾欲自躬必先躬人爾欲自師必先師人爾欲自營必先管人爾欲自濟必先濟人爾欲自達必先達人爾欲自通必先通人爾欲自樂必先樂人爾欲自飽必先飽人爾欲自饒必先饒人爾欲自先必須先人爾欲自政必先政人爾欲自定必先定人爾欲自慈必光慈人爾欲自孝必先孝人謙躬勤身和顔晨夕禮侍我尊見他尊老人敬如我老尊心存口念道恒願躬禮勤易味使甘進不離於晨昬寒冰不先衣當先衣老人行此十八善應徹於上天有財不藏蓄開倉惠窮人年出數千斛悉以救困貧龍君少行此感悟於上天上天須忠孝命盡得申延延益十倍筭命過龍來迎積善孝所致慈心多惠窮龍驕實難領拜之爲龍君昇降遍其意遊詠任所
